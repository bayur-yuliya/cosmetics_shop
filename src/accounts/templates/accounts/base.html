{% load static %}

<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'cosmetics_shop/css/styles.css' %}">
</head>
<body>

<!-- ШАПКА -->
<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'main_page' %}">
            Cosmetics Shop
        </a>

        <div class="ms-auto d-flex align-items-center">
            <a href="{% url 'cart' %}" class="btn btn-outline-success me-2">
                Корзина
                {% if cart_item_count %}
                    ({{ cart_item_count }})
                {% endif %}
            </a>

            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}" class="btn btn-outline-danger">
                    Выйти
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<div class="container">
    <div class="row">

        <!-- ЛЕВОЕ МЕНЮ -->
        <div class="col-md-3 mb-4">
            <div class="list-group account-menu">
                <a href="{% url 'user_contact' %}" class="list-group-item list-group-item-action">
                    Контактная информация
                </a>
                <a href="{% url 'order_history' %}" class="list-group-item list-group-item-action">
                    История заказов
                </a>
                <a href="{% url 'favorites' %}" class="list-group-item list-group-item-action">
                    Избранное
                </a>
                <a href="{% url 'delete_account' %}" class="list-group-item list-group-item-action text-danger">
                    Удалить аккаунт
                </a>
            </div>
        </div>

        <!-- ПРАВАЯ ЧАСТЬ -->
        <div class="col-md-9">
            <div class="card p-4">
                {% block content %}
                {% endblock %}
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
