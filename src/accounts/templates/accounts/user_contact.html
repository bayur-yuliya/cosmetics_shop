{% extends 'accounts/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}

<div class="container my-4">
    <h2 class="mb-4">Контактная информация</h2>

    <div class="card p-4">
        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success mt-3">
                Сохранить изменения
            </button>
        </form>
    </div>
</div>
{% endblock %}
