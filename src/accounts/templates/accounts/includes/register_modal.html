{% load socialaccount %}

<div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg rounded-4">
      <div class="modal-header">
        <h5 class="modal-title">Регистрация</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">

        <form id="registerForm" method="post" action="{% url 'account_signup' %}?next={{  request.get_full_path|urlencode  }}">
          {% csrf_token %}
          <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
          </div>
          <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Пароль" required>
          </div>
          <div id="registerErrors" class="alert alert-danger d-none" style="margin-bottom: 15px;"></div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="agreeTerms" required>
            <label class="form-check-label" for="agreeTerms">
              Я согласен на обработку персональных данных
              и принимаю <a href="{%  url 'privacy_policy'  %}" target="_blank">политику конфиденциальности</a>
            </label>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="registerButton" disabled>
            <span class="btn-text">Зарегистрироваться</span>
            <span class="spinner-border spinner-border-sm d-none" role="status"></span>
          </button>
        </form>

        <div class="text-center mt-3">
          <div style="margin-top: 20px;">
            <a href="{% provider_login_url 'google' %}" class="btn btn-google">
                <i class="fab fa-google"></i> Войти через Google
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
