{%  load custom_filters  %}

<div class="product-card">

    <div class="product-image-wrapper">
        <button
            type="button"
            class="favorite-btn {% if product.is_favorite %}active{% endif %}"
            data-product-id="{{ product.id }}"
        >
            ♥
        </button>

        <img src="{{ product.image.url }}"
             alt="{{ product.name }}"
             class="product-image">
    </div>

    <a href="{% url 'product_page' product.code %}">
        <h5 class="product-title">{{ product.name|truncatewords:10 }}</h5>
    </a>

    {{ product.group.name }}<br>
    {{ product.brand }}<br>

    {% if product.stock %}
        <p class="product-price">{{ product.price|number_format }} грн</p>
    {% endif %}

    {% if product.id in cart_products %}
        <button type="button" class="btn btn-sm mt-2 btn-primary disabled">В корзине</button>
    {% elif product.stock %}
        <button type="button" class="btn btn-success btn-sm mt-2 js-cart-btn-list"
                data-product-code="{{ product.code }}">
            В корзину
        </button>
    {% else %}
        Товара нет в наличии
    {% endif %}

</div>
