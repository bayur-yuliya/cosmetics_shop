{% if page_elements.paginator.num_pages > 1 %}
    <div class="d-flex justify-content-center mt-3">
        {% if page_elements.has_previous %}
            <a href="?page={{ page_elements.previous_page_number }}{% for key, value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}"
               class="btn btn-outline-secondary btn-sm me-2">← Назад</a>
        {% endif %}

        <span class="align-self-center">
            {{ page_elements.number }} / {{ page_elements.paginator.num_pages }}
        </span>

        {% if page_elements.has_next %}
            <a href="?page={{ page_elements.next_page_number }}{% for key, value in request.GET.items %}{% if key != 'page' %}&{{ key }}={{ value }}{% endif %}{% endfor %}"
               class="btn btn-outline-secondary btn-sm ms-2">Вперёд →</a>
        {% endif %}
    </div>
{% endif %}
