{% load socialaccount %}

<div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg rounded-4">
      <div class="modal-header">
        <h5 class="modal-title">Регистрация</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form method="post" action="{% url 'account_signup' %}">
          {% csrf_token %}
          <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
          </div>
          <div class="mb-3">
            <input type="password" name="password1" class="form-control" placeholder="Пароль" required>
          </div>
          <div class="mb-3">
            <input type="password" name="password2" class="form-control" placeholder="Повторение пароля" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
        </form>
        <div class="text-center mt-3">
          <div style="margin-top: 20px;">
            <a href="{% provider_login_url 'google' %}" class="btn btn-google">
                <i class="fab fa-google"></i> Войти через Google
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
