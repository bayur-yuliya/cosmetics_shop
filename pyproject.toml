[tool.mypy]
plugins = ["mypy_django_plugin.main"]

python_version = "3.11"
strict_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
check_untyped_defs = true

[tool.django-stubs]
django_settings_module = "config.settings"

# mypy
[[tool.mypy.overrides]]
module = "*.migrations.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = ["allauth.*"]
ignore_missing_imports = true

# ruff
[tool.ruff]
line-length = 88
src = [
    "src",
]

# pytest
[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py"]
pythonpath = ["src"]
addopts = "--cov=src --cov-report=html --reuse-db --nomigrations"

# coverage
[tool.coverage.run]
omit = [
    "*/migrations/*",
    "*/management/*",
    "*/tests/*",
    "manage.py",
    "*/venv/*",
    "*/site-packages/*",
    "*/config/*",
    "*urls.py*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __str__",
    'if __name__ == .__main__.:'
]
